name: XposedEdgePro_Final_Ultimate
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update -y 2>/dev/null || true
          sudo apt install -y apktool apksigner zip unzip 2>/dev/null || true

      # 只解压必须修改的部分，不动 Xposed 入口
      - name: Extract and patch only what's needed
        run: |
          mkdir -p tmp
          unzip -q XEdgePro.apk -d tmp/
          cd tmp

          # 只改 AndroidManifest 窗口类型
          sed -i 's|TYPE_SYSTEM_ALERT|TYPE_APPLICATION_OVERLAY|g' AndroidManifest.xml 2>/dev/null || true
          sed -i 's|TYPE_PHONE|TYPE_APPLICATION_OVERLAY|g' AndroidManifest.xml 2>/dev/null || true

          # 冰箱命令加 --user 0
          find res -name "*.xml" | xargs sed -i 's|pm disable|pm disable --user 0|g' 2>/dev/null || true
          find res -name "*.xml" | xargs sed -i 's|pm enable|pm enable --user 0|g' 2>/dev/null || true

          # 重新打包（不碰 classes.dex、不碰 assets、不碰 xposed 配置）
          zip -q -r ../patched.apk ./*
          cd ..

      # 签名
      - name: Sign APK
        run: |
          keytool -genkey -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android -keypass android -dname "CN=Debug" -noprompt 2>/dev/null || true
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android patched.apk 2>/dev/null || true
          mv patched.apk XEdgePro_Fixed.apk

      # 上传
      - name: Upload final APK
        uses: actions/upload-artifact@v4
        with:
          name: XEdgePro_Fixed_Ultimate
          path: XEdgePro_Fixed.apk
