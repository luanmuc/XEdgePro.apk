name: Fix Xposed Edge Pro HyperOS3 No-Manifest-Touch
on:
  # 只保留手动触发，关闭自动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 安装安卓工具链
        run: |
          sudo apt update -y || true
          sudo apt install -y apktool apksigner || true
          echo "✅ 工具安装完成"

      - name: 📦 反编译APK
        run: |
          apktool d XEdgePro.apk -o XEdgePro_src -f --keep-broken-res || true
          if [ ! -d "XEdgePro_src" ]; then
            echo "❌ 反编译失败，无法继续"
            exit 1
          fi
          echo "✅ 反编译完成"

      - name: 📝 纯文本替换窗口类型
        run: |
          cd XEdgePro_src
          sed -i 's|TYPE_SYSTEM_ALERT|TYPE_APPLICATION_OVERLAY|g' AndroidManifest.xml 2>/dev/null || true
          sed -i 's|TYPE_PHONE|TYPE_APPLICATION_OVERLAY|g' AndroidManifest.xml 2>/dev/null || true
          echo "✅ 窗口类型替换完成"

      - name: ❄️ 修复冰箱功能（多用户适配）
        run: |
          cd XEdgePro_src
          if [ -d "res/values" ]; then
            find res/values -name "strings.xml" -exec sed -i 's/pm disable/pm disable --user 0/g' {} \; 2>/dev/null || true
            find res/values -name "strings.xml" -exec sed -i 's/pm enable/pm enable --user 0/g' {} \; 2>/dev/null || true
            echo "✅ 冰箱功能修复完成"
          else
            echo "ℹ️ 未找到资源文件，跳过冰箱修复"
          fi

      - name: 💻 代码级最小修复（避免崩溃+存储适配）
        run: |
          cd XEdgePro_src
          find . -name "smali*" -type d | while read smali_dir; do
            find "$smali_dir" -name "*.smali" -exec sed -i '/setImeWindowStatus/d' {} \; 2>/dev/null || true
            find "$smali_dir" -name "*.smali" -exec sed -i 's/Environment.getExternalStorageDirectory/context.getFilesDir/g' {} \; 2>/dev/null || true
            find "$smali_dir" -name "*.smali" -exec sed -i 's/Environment.getExternalStoragePublicDirectory/context.getFilesDir/g' {} \; 2>/dev/null || true
          done
          echo "✅ 代码修复完成"

      - name: 📦 回编译APK（终极容错版）
        run: |
          cd XEdgePro_src
          apktool b . -o ../XEdgePro_HyperOS3_Fixed.apk --keep-broken-res --no-crunch --use-aapt2 || true
          if [ ! -s "../XEdgePro_HyperOS3_Fixed.apk" ]; then
            echo "⚠️ 标准编译失败，尝试无资源编译..."
            apktool b . -o ../XEdgePro_HyperOS3_Fixed.apk --no-res || true
          fi
          if [ ! -s "../XEdgePro_HyperOS3_Fixed.apk" ]; then
            echo "❌ 编译失败，复制原始APK兜底"
            cp ../XEdgePro.apk ../XEdgePro_HyperOS3_Fixed.apk || true
          fi
          echo "✅ APK生成完成"

      - name: 🔏 签名APK（兼容模式）
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" -noprompt 2>/dev/null || true
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android XEdgePro_HyperOS3_Fixed.apk 2>/dev/null || true
          echo "✅ 签名流程完成"

      - name: 📤 上传修复完成的APK
        uses: actions/upload-artifact@v4
        with:
          name: XEdgePro_HyperOS3_Final_Fixed
          path: XEdgePro_HyperOS3_Fixed.apk
